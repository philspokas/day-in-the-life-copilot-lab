name: "🐛 Bug Report"
description: "Report a bug in ContosoUniversity"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: area-affected
    attributes:
      label: Area Affected
      description: "Which area of the application is affected?"
      options:
        - Students
        - Courses
        - Instructors
        - Departments
        - Enrollments
        - Build/CI
        - Other
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: "A clear and concise description of the bug"
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: "Steps to reproduce the behavior"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: "What you expected to happen"
      placeholder: "Describe the expected behavior..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: "What actually happened"
      placeholder: "Describe the actual behavior..."
    validations:
      required: true
